<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ff2a6d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Anime Details - Infinx</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ff2a6d;
            --primary-dark: #cc0052;
            --secondary: #05d9e8;
            --dark: #0a0a0f;
            --darker: #050508;
            --card-bg: #151520;
            --card-hover: #1f1f2e;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --text-light: #c0c0d0;
            --border: #2a2a3a;
            --gradient: linear-gradient(135deg, #ff2a6d, #05d9e8);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --header-height: 60px;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            background: none;
            -webkit-text-fill-color: var(--primary);
            margin-right: 6px;
            font-size: 1.8rem;
        }

        .back-home {
            color: var(--text);
            text-decoration: none;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-home i {
            font-size: 1.2rem;
        }

        .back-home:active {
            background: var(--primary);
            transform: scale(0.96);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hero Section - Mobile Optimized */
        .anime-hero {
            margin-top: var(--header-height);
            position: relative;
            min-height: 70vh;
            display: flex;
            align-items: flex-end;
            padding: 80px 0 40px;
            background-size: cover;
            background-position: center 30%;
            background-attachment: scroll;
        }

        .anime-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%);
        }

        .anime-hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .anime-hero-content {
                flex-direction: row;
                gap: 40px;
            }
        }

        .anime-poster {
            flex-shrink: 0;
            width: 180px;
            margin: 0 auto;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        @media (min-width: 768px) {
            .anime-poster {
                width: 250px;
                margin: 0;
            }
        }

        .anime-poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .anime-info-hero {
            flex: 1;
            text-align: center;
        }

        @media (min-width: 768px) {
            .anime-info-hero {
                text-align: left;
            }
        }

        .anime-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        @media (min-width: 768px) {
            .anime-title {
                font-size: 3rem;
            }
        }

        .anime-title-japanese {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        @media (min-width: 768px) {
            .anime-title-japanese {
                font-size: 1.2rem;
            }
        }

        .anime-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-badges {
                justify-content: flex-start;
            }
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .badge-score {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .badge-rank {
            background: rgba(255, 42, 109, 0.2);
            color: var(--primary);
        }

        .badge-status {
            background: rgba(5, 217, 232, 0.2);
            color: var(--secondary);
        }

        .anime-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-stats {
                justify-content: flex-start;
            }
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1rem;
            color: var(--text-light);
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .stat i {
            color: var(--primary);
            width: 16px;
            font-size: 1rem;
        }

        .anime-synopsis {
            margin-bottom: 15px;
            line-height: 1.6;
            color: var(--text-light);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-synopsis.expanded {
            -webkit-line-clamp: unset;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
        }

        .anime-genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-genres {
                justify-content: flex-start;
            }
        }

        .genre-tag {
            background: rgba(255, 42, 109, 0.15);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .genre-tag:active {
            background: var(--primary);
            color: white;
            transform: scale(0.96);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .action-buttons {
                justify-content: flex-start;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
        }

        /* Video Section - Mobile Optimized */
        .video-section {
            background: var(--darker);
            border-radius: var(--radius);
            margin: 20px 0;
            overflow: hidden;
        }

        .video-player {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-info {
            padding: 12px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .video-info {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .current-episode {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .quality-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quality-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .quality-btn:active {
            transform: scale(0.96);
        }

        .quality-btn.active {
            background: var(--primary);
        }

        /* Episodes Section - Mobile Optimized */
        .episodes-section {
            margin: 30px 0;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 12px;
            position: relative;
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 1.8rem;
            }
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 480px) {
            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
        }

        .episodes-grid::-webkit-scrollbar {
            width: 4px;
        }

        .episodes-grid::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 2px;
        }

        .episodes-grid::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .episode-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .episode-card:active {
            transform: scale(0.96);
            background: rgba(255, 42, 109, 0.2);
        }

        .episode-card.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .episode-number {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .episode-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-card.active .episode-title {
            color: white;
        }

        /* Info Grid - Mobile Optimized */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin: 30px 0;
        }

        @media (min-width: 768px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }

        .info-card h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        @media (min-width: 480px) {
            .info-list li {
                flex-direction: row;
                gap: 10px;
            }
        }

        .info-label {
            font-weight: 600;
            color: var(--text-muted);
            min-width: 100px;
        }

        .info-value {
            flex: 1;
            color: var(--text-light);
            word-break: break-word;
        }

        /* Characters Grid - Mobile Optimized */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        @media (min-width: 480px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 20px;
            }
        }

        .character-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .character-card:active {
            transform: scale(0.96);
        }

        .character-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
        }

        @media (min-width: 480px) {
            .character-img {
                width: 100px;
                height: 100px;
            }
        }

        .character-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .character-role {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Recommendations Grid - Mobile Optimized */
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        @media (min-width: 480px) {
            .recommendations-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
        }

        .rec-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .rec-card:active {
            transform: scale(0.96);
        }

        .rec-img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .rec-info {
            padding: 8px;
        }

        .rec-title {
            font-size: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Trailer Modal - Mobile Optimized */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
        }

        .modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-close:active {
            background: var(--primary);
            transform: scale(0.96);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-top: 80px;
        }

        .error-message i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .error-message h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* No Data Message */
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        /* Android Specific Fixes */
        @media (max-width: 768px) {
            input, button, select, textarea, a {
                touch-action: manipulation;
            }
            
            .video-player video {
                object-fit: contain;
            }
            
            .episodes-grid {
                -webkit-overflow-scrolling: touch;
                scroll-behavior: smooth;
            }
        }

        /* Landscape Mode Optimization */
        @media (orientation: landscape) and (max-height: 500px) {
            .anime-hero {
                min-height: auto;
                padding: 40px 0 20px;
            }
            
            .anime-poster {
                width: 120px;
            }
            
            .anime-title {
                font-size: 1.4rem;
            }
            
            .anime-stats {
                gap: 8px;
            }
            
            .stat {
                font-size: 0.9rem;
                padding: 2px 8px;
            }
        }

        /* High Contrast / Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --dark: #0a0a0f;
                --darker: #050508;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-infinity"></i>
            Infinx
        </a>
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> <span>Home</span>
        </a>
    </header>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Trailer Modal -->
    <div class="modal" id="trailerModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">
                <i class="fas fa-times"></i>
            </button>
            <iframe id="trailerIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'https://api.jikan.moe/v4';
        const CONSUMET_API = 'https://api.consumet.org';
        
        let currentAnime = null;
        let currentEpisodes = [];
        let currentHls = null;

        // Get anime ID from URL
        function getAnimeId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Fetch anime details with retry
        async function fetchAnimeDetails(id, retryCount = 0) {
            try {
                await new Promise(resolve => setTimeout(resolve, 400));
                const response = await fetch(`${API_BASE}/anime/${id}/full`);
                if (!response.ok) throw new Error('Anime not found');
                const data = await response.json();
                return data.data;
            } catch (error) {
                if (retryCount < 2) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    return fetchAnimeDetails(id, retryCount + 1);
                }
                throw error;
            }
        }

        // Fetch episodes from Consumet
        async function fetchEpisodes(gogoanimeId) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/info/${gogoanimeId}`);
                if (!response.ok) return [];
                const data = await response.json();
                return data.episodes || [];
            } catch (error) {
                console.error('Episode fetch error:', error);
                return [];
            }
        }

        // Search for Gogoanime ID
        async function searchGogoanimeId(title) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/${encodeURIComponent(title)}`);
                if (!response.ok) return null;
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].id;
                }
                return null;
            } catch (error) {
                console.error('Gogoanime search error:', error);
                return null;
            }
        }

        // Get streaming links for episode
        async function getStreamingLinks(episodeId) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/watch/${episodeId}`);
                if (!response.ok) return [];
                const data = await response.json();
                return data.sources || [];
            } catch (error) {
                console.error('Stream fetch error:', error);
                return [];
            }
        }

        // Load video with HLS support
        function loadVideo(url, isM3U8 = false) {
            const video = document.getElementById('anime-video');
            if (!video) return;
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            
            video.poster = '';
            
            if (isM3U8 && Hls.isSupported()) {
                currentHls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay prevented:', e));
                });
                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        // Try direct play as fallback
                        video.src = url;
                        video.load();
                        video.play().catch(e => console.log('Play error:', e));
                    }
                });
            } else {
                video.src = url;
                video.load();
                video.play().catch(e => console.log('Autoplay prevented:', e));
            }
        }

        // Load episode
        async function loadEpisode(episodeId, episodeNum) {
            const videoSection = document.getElementById('videoSection');
            if (videoSection) {
                videoSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            const episodeTitle = document.getElementById('currentEpisodeTitle');
            if (episodeTitle) {
                episodeTitle.textContent = `Episode ${episodeNum}`;
            }
            
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            if (videoPlaceholder) {
                videoPlaceholder.innerHTML = `
                    <div class="video-player">
                        <video id="anime-video" controls playsinline webkit-playsinline preload="metadata">
                            <source src="" type="video/mp4">
                            Your browser does not support video playback.
                        </video>
                    </div>
                    <div class="video-info">
                        <div class="current-episode" id="currentEpisodeTitle">Episode ${episodeNum}</div>
                        <div class="quality-selector" id="qualitySelector"></div>
                    </div>
                `;
            }
            
            const sources = await getStreamingLinks(episodeId);
            
            if (sources && sources.length > 0) {
                const qualitySelector = document.getElementById('qualitySelector');
                if (qualitySelector) {
                    qualitySelector.innerHTML = '';
                    sources.forEach((source, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'quality-btn';
                        if (idx === 0) btn.classList.add('active');
                        btn.textContent = source.quality || 'Auto';
                        btn.onclick = () => {
                            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            loadVideo(source.url, source.url.includes('.m3u8'));
                        };
                        qualitySelector.appendChild(btn);
                    });
                }
                
                // Load first source
                const firstSource = sources[0];
                loadVideo(firstSource.url, firstSource.url.includes('.m3u8'));
            } else {
                const videoPlaceholder = document.getElementById('videoPlaceholder');
                if (videoPlaceholder) {
                    videoPlaceholder.innerHTML = `
                        <div class="error-message" style="margin: 0; padding: 40px;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>No Stream Available</h3>
                            <p>No video sources found for this episode.</p>
                            <p style="font-size: 0.9rem; margin-top: 8px;">Try a different episode or check back later.</p>
                        </div>
                    `;
                }
            }
        }

        // Toggle synopsis expand
        function setupReadMore() {
            const synopsis = document.querySelector('.anime-synopsis');
            const readMoreBtn = document.getElementById('readMoreBtn');
            if (synopsis && readMoreBtn) {
                readMoreBtn.addEventListener('click', () => {
                    synopsis.classList.toggle('expanded');
                    readMoreBtn.textContent = synopsis.classList.contains('expanded') ? 'Read Less' : 'Read More';
                });
            }
        }

        // Load characters
        async function loadCharacters(animeId) {
            const container = document.getElementById('charactersGrid');
            if (!container) return;
            
            try {
                await new Promise(resolve => setTimeout(resolve, 400));
                const response = await fetch(`${API_BASE}/anime/${animeId}/characters`);
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = '';
                    data.data.slice(0, 12).forEach(char => {
                        const charCard = document.createElement('div');
                        charCard.className = 'character-card';
                        const charImage = char.character.images?.jpg?.image_url || 'https://via.placeholder.com/100x100';
                        charCard.innerHTML = `
                            <img class="character-img" src="${charImage}" alt="${char.character.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/100x100'">
                            <div class="character-name">${char.character.name.length > 20 ? char.character.name.substring(0, 18) + '...' : char.character.name}</div>
                            <div class="character-role">${char.role}</div>
                        `;
                        container.appendChild(charCard);
                    });
                } else {
                    container.innerHTML = '<div class="no-data">No character information available.</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="no-data">Failed to load characters.</div>';
            }
        }
        
        // Load recommendations
        async function loadRecommendations(animeId) {
            const container = document.getElementById('recommendationsGrid');
            if (!container) return;
            
            try {
                await new Promise(resolve => setTimeout(resolve, 400));
                const response = await fetch(`${API_BASE}/anime/${animeId}/recommendations`);
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = '';
                    data.data.slice(0, 8).forEach(rec => {
                        const recCard = document.createElement('div');
                        recCard.className = 'rec-card';
                        const anime = rec.entry;
                        const image = anime.images?.jpg?.image_url || 'https://via.placeholder.com/140x210';
                        recCard.innerHTML = `
                            <img class="rec-img" src="${image}" alt="${anime.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/140x210'">
                            <div class="rec-info">
                                <div class="rec-title">${anime.title.length > 25 ? anime.title.substring(0, 22) + '...' : anime.title}</div>
                            </div>
                        `;
                        recCard.onclick = () => {
                            window.location.href = `anime-details.html?id=${anime.mal_id}`;
                        };
                        container.appendChild(recCard);
                    });
                } else {
                    container.innerHTML = '<div class="no-data">No recommendations available.</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="no-data">Failed to load recommendations.</div>';
            }
        }

        // Render full page
        async function renderAnimePage() {
            const app = document.getElementById('app');
            const animeId = getAnimeId();
            
            if (!animeId) {
                app.innerHTML = `
                    <div class="container">
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle"></i>
                            <h2>No Anime Selected</h2>
                            <p>Please go back and select an anime to watch.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 16px; display: inline-flex;">Go Home</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            try {
                currentAnime = await fetchAnimeDetails(animeId);
                
                if (!currentAnime) {
                    throw new Error('Anime not found');
                }
                
                // Search for Gogoanime ID
                const gogoId = await searchGogoanimeId(currentAnime.title);
                if (gogoId) {
                    currentEpisodes = await fetchEpisodes(gogoId);
                }
                
                // Render the page
                app.innerHTML = `
                    <!-- Hero Section -->
                    <div class="anime-hero" style="background-image: url('${currentAnime.images?.jpg?.large_image_url || ''}')">
                        <div class="container">
                            <div class="anime-hero-content">
                                <div class="anime-poster">
                                    <img src="${currentAnime.images?.jpg?.large_image_url || currentAnime.images?.jpg?.image_url}" alt="${currentAnime.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450'">
                                </div>
                                <div class="anime-info-hero">
                                    <h1 class="anime-title">${escapeHtml(currentAnime.title)}</h1>
                                    ${currentAnime.title_japanese ? `<div class="anime-title-japanese">${escapeHtml(currentAnime.title_japanese)}</div>` : ''}
                                    <div class="anime-badges">
                                        <span class="badge badge-score"><i class="fas fa-star"></i> ${currentAnime.score || 'N/A'}</span>
                                        ${currentAnime.rank ? `<span class="badge badge-rank"><i class="fas fa-chart-line"></i> Rank #${currentAnime.rank}</span>` : ''}
                                        <span class="badge badge-status"><i class="fas fa-info-circle"></i> ${currentAnime.status || 'Unknown'}</span>
                                    </div>
                                    <div class="anime-stats">
                                        <div class="stat"><i class="fas fa-calendar"></i> ${currentAnime.year || '?'}</div>
                                        <div class="stat"><i class="fas fa-tv"></i> ${currentAnime.episodes || '?'} eps</div>
                                        <div class="stat"><i class="fas fa-clock"></i> ${currentAnime.duration || '?'}</div>
                                        <div class="stat"><i class="fas fa-chart-simple"></i> Pop #${currentAnime.popularity || '?'}</div>
                                    </div>
                                    <p class="anime-synopsis">${escapeHtml(currentAnime.synopsis || 'No synopsis available.')}</p>
                                    <button class="read-more-btn" id="readMoreBtn">Read More</button>
                                    <div class="anime-genres">
                                        ${currentAnime.genres?.map(g => `<span class="genre-tag" data-genre="${g.mal_id}">${escapeHtml(g.name)}</span>`).join('') || ''}
                                    </div>
                                    <div class="action-buttons">
                                        <button class="btn btn-primary" id="watchNowBtn">
                                            <i class="fas fa-play"></i> Watch Now
                                        </button>
                                        ${currentAnime.trailer?.embed_url ? `
                                            <button class="btn btn-outline" id="trailerBtn">
                                                <i class="fas fa-film"></i> Trailer
                                            </button>
                                        ` : ''}
                                        <button class="btn btn-outline" id="shareBtn">
                                            <i class="fas fa-share-alt"></i> Share
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="container">
                        <!-- Video Player Section -->
                        <div class="video-section" id="videoSection">
                            <div id="videoPlaceholder">
                                <div class="video-player" style="background: #000; min-height: 200px; display: flex; align-items: center; justify-content: center;">
                                    <p style="color: #666; font-size: 0.9rem; text-align: center; padding: 20px;">Select an episode to start watching</p>
                                </div>
                            </div>
                        </div>

                        <!-- Episodes Section -->
                        <div class="episodes-section" id="episodesSection">
                            <h2 class="section-title">Episodes</h2>
                            <div class="episodes-grid" id="episodesGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>

                        <!-- Additional Info Grid -->
                        <div class="info-grid">
                            <div class="info-card">
                                <h3><i class="fas fa-info-circle"></i> Details</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Type:</span><span class="info-value">${currentAnime.type || 'Unknown'}</span></li>
                                    <li><span class="info-label">Episodes:</span><span class="info-value">${currentAnime.episodes || '?'}</span></li>
                                    <li><span class="info-label">Status:</span><span class="info-value">${currentAnime.status || 'Unknown'}</span></li>
                                    <li><span class="info-label">Aired:</span><span class="info-value">${currentAnime.aired?.string || 'Unknown'}</span></li>
                                    <li><span class="info-label">Studios:</span><span class="info-value">${currentAnime.studios?.map(s => s.name).join(', ') || 'Unknown'}</span></li>
                                    <li><span class="info-label">Source:</span><span class="info-value">${currentAnime.source || 'Unknown'}</span></li>
                                </ul>
                            </div>
                            
                            <div class="info-card">
                                <h3><i class="fas fa-tags"></i> Themes</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Themes:</span><span class="info-value">${currentAnime.themes?.map(t => t.name).join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Demographics:</span><span class="info-value">${currentAnime.demographics?.map(d => d.name).join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Opening:</span><span class="info-value">${currentAnime.theme?.openings?.slice(0, 2).join(', ') || 'None'}</span></li>
                                </ul>
                            </div>
                        </div>

                        <!-- Characters Section -->
                        <div class="characters-section">
                            <h2 class="section-title">Characters</h2>
                            <div class="characters-grid" id="charactersGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>

                        <!-- Recommendations Section -->
                        <div class="recommendations-section">
                            <h2 class="section-title">You Might Also Like</h2>
                            <div class="recommendations-grid" id="recommendationsGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Setup read more
                setupReadMore();
                
                // Load episodes
                if (currentEpisodes.length > 0) {
                    const episodesGrid = document.getElementById('episodesGrid');
                    episodesGrid.innerHTML = '';
                    const displayEpisodes = currentEpisodes.slice(0, 50);
                    displayEpisodes.forEach((ep) => {
                        const epCard = document.createElement('div');
                        epCard.className = 'episode-card';
                        epCard.innerHTML = `
                            <div class="episode-number">Ep ${ep.number}</div>
                            <div class="episode-title">${ep.title ? (ep.title.length > 15 ? ep.title.substring(0, 12) + '...' : ep.title) : `Episode ${ep.number}`}</div>
                        `;
                        epCard.onclick = () => {
                            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
                            epCard.classList.add('active');
                            loadEpisode(ep.id, ep.number);
                        };
                        episodesGrid.appendChild(epCard);
                    });
                } else {
                    const episodesGrid = document.getElementById('episodesGrid');
                    episodesGrid.innerHTML = '<div class="no-data">No episodes available for streaming.</div>';
                }
                
                // Load characters and recommendations
                await loadCharacters(animeId);
                await loadRecommendations(animeId);
                
                // Event listeners
                document.getElementById('watchNowBtn')?.addEventListener('click', () => {
                    const firstEpisode = document.querySelector('.episode-card');
                    if (firstEpisode) {
                        firstEpisode.click();
                    } else {
                        document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth' });
                    }
                });
                
                document.getElementById('trailerBtn')?.addEventListener('click', () => {
                    const modal = document.getElementById('trailerModal');
                    const iframe = document.getElementById('trailerIframe');
                    iframe.src = currentAnime.trailer?.embed_url;
                    modal.classList.add('active');
                });
                
                document.getElementById('shareBtn')?.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: currentAnime.title,
                            text: `Check out ${currentAnime.title} on AnimeDiscovery`,
                            url: window.location.href
                        }).catch(() => {
                            copyToClipboard();
                        });
                    } else {
                        copyToClipboard();
                    }
                });
                
                document.querySelectorAll('.genre-tag').forEach(tag => {
                    tag.addEventListener('click', () => {
                        window.location.href = `index.html?genre=${tag.dataset.genre}`;
                    });
                });
                
                document.getElementById('closeModalBtn')?.addEventListener('click', () => {
                    const modal = document.getElementById('trailerModal');
                    const iframe = document.getElementById('trailerIframe');
                    iframe.src = '';
                    modal.classList.remove('active');
                });
                
                modalCloseOnOutside();
                
            } catch (error) {
                console.error('Error:', error);
                app.innerHTML = `
                    <div class="container">
                        <div class="error-message">
                            <i class="fas fa-frown"></i>
                            <h2>Anime Not Found</h2>
                            <p>We couldn't find the anime you're looking for.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 16px; display: inline-flex;">Go Home</a>
                        </div>
                    </div>
                `;
            }
        }
        
        function copyToClipboard() {
            navigator.clipboard.writeText(window.location.href);
            alert('Link copied to clipboard!');
        }
        
        function modalCloseOnOutside() {
            const modal = document.getElementById('trailerModal');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    const iframe = document.getElementById('trailerIframe');
                    iframe.src = '';
                    modal.classList.remove('active');
                }
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Start the page
        renderAnimePage();
    </script>
</body>
</html>
