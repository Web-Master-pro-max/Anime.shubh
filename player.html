<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ff2a6d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Watch Anime - Infinx</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ff2a6d;
            --primary-dark: #cc0052;
            --secondary: #05d9e8;
            --dark: #0a0a0f;
            --darker: #050508;
            --card-bg: #151520;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --text-light: #c0c0d0;
            --border: #2a2a3a;
            --gradient: linear-gradient(135deg, #ff2a6d, #05d9e8);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --header-height: 60px;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            background: none;
            -webkit-text-fill-color: var(--primary);
            margin-right: 6px;
            font-size: 1.6rem;
        }

        .back-home {
            color: var(--text);
            text-decoration: none;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-home:active {
            background: var(--primary);
            transform: scale(0.96);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .anime-hero {
            margin-top: var(--header-height);
            position: relative;
            min-height: 50vh;
            display: flex;
            align-items: flex-end;
            padding: 60px 0 40px;
            background-size: cover;
            background-position: center 30%;
        }

        .anime-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%);
        }

        .anime-hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .anime-hero-content {
                flex-direction: row;
                gap: 40px;
            }
        }

        .anime-poster {
            flex-shrink: 0;
            width: 160px;
            margin: 0 auto;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        @media (min-width: 768px) {
            .anime-poster {
                width: 220px;
                margin: 0;
            }
        }

        .anime-poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .anime-info-hero {
            flex: 1;
            text-align: center;
        }

        @media (min-width: 768px) {
            .anime-info-hero {
                text-align: left;
            }
        }

        .anime-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        @media (min-width: 768px) {
            .anime-title {
                font-size: 2.5rem;
            }
        }

        .anime-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-badges {
                justify-content: flex-start;
            }
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-score {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .badge-rank {
            background: rgba(255, 42, 109, 0.2);
            color: var(--primary);
        }

        .anime-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-stats {
                justify-content: flex-start;
            }
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            color: var(--text-light);
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .anime-synopsis {
            margin-bottom: 12px;
            line-height: 1.6;
            color: var(--text-light);
            font-size: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.8rem;
            margin-bottom: 12px;
            cursor: pointer;
            display: inline-block;
        }

        .anime-genres {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .anime-genres {
                justify-content: flex-start;
            }
        }

        .genre-tag {
            background: rgba(255, 42, 109, 0.15);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .action-buttons {
                justify-content: flex-start;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
        }

        /* Video Section */
        .video-section {
            background: var(--darker);
            border-radius: var(--radius);
            margin: 20px 0;
            overflow: hidden;
        }

        .video-player {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-info {
            padding: 16px;
            background: var(--card-bg);
        }

        .current-episode {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .server-selector {
            margin-bottom: 12px;
        }

        .server-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .server-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .server-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .server-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .quality-wrapper {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .quality-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .quality-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .quality-btn.active {
            background: var(--primary);
        }

        .fix-guide {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }

        .fix-guide a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Episodes Section */
        .episodes-section {
            margin: 30px 0;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 12px;
            position: relative;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 18px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        @media (min-width: 768px) {
            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }
        }

        .episodes-grid::-webkit-scrollbar {
            width: 4px;
        }

        .episodes-grid::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 2px;
        }

        .episodes-grid::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .episode-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .episode-card:active {
            transform: scale(0.96);
        }

        .episode-card.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .episode-number {
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin: 30px 0;
        }

        @media (min-width: 768px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }

        .info-card h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        @media (min-width: 480px) {
            .info-list li {
                flex-direction: row;
                gap: 10px;
            }
        }

        .info-label {
            font-weight: 600;
            color: var(--text-muted);
            min-width: 90px;
            font-size: 0.85rem;
        }

        .info-value {
            flex: 1;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .error-message {
            text-align: center;
            padding: 50px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-top: 80px;
        }

        .error-message i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .episodes-grid {
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-infinity"></i>
            Infinx
        </a>
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> <span>Home</span>
        </a>
    </header>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        // ===== MULTIPLE API ENDPOINTS (Fallback system) =====
        const API_BASE = 'https://api.jikan.moe/v4';
        
        // Multiple Consumet API instances (in case one is down)
        const CONSUMET_APIS = [
            'https://api.consumet.org',
            'https://consumet-api-production-3e1a.up.railway.app',
            'https://consumet-api.cyclic.app'
        ];
        
        // Alternative: AnimePahe API
        const ANIMEPAHE_API = 'https://api.animepahe.com/api';
        
        let currentAnime = null;
        let currentEpisodes = [];
        let currentHls = null;
        let currentConsumetApi = CONSUMET_APIS[0];

        function getAnimeId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function fetchAPI(url, retryCount = 0) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retryCount < 2) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    return fetchAPI(url, retryCount + 1);
                }
                throw error;
            }
        }

        async function fetchAnimeDetails(id) {
            return fetchAPI(`${API_BASE}/anime/${id}/full`);
        }

        // Try multiple APIs to get episodes
        async function fetchEpisodesFromMultipleAPIs(animeTitle) {
            // First try: Consumet with search
            for (const api of CONSUMET_APIS) {
                try {
                    console.log(`Trying Consumet API: ${api}`);
                    const searchUrl = `${api}/anime/gogoanime/${encodeURIComponent(animeTitle)}`;
                    const searchData = await fetchAPI(searchUrl);
                    
                    if (searchData?.results?.length > 0) {
                        const animeId = searchData.results[0].id;
                        const infoUrl = `${api}/anime/gogoanime/info/${animeId}`;
                        const infoData = await fetchAPI(infoUrl);
                        
                        if (infoData?.episodes?.length > 0) {
                            currentConsumetApi = api;
                            return infoData.episodes;
                        }
                    }
                } catch (error) {
                    console.log(`Consumet API ${api} failed:`, error);
                }
            }
            
            // Second try: AnimePahe API
            try {
                console.log('Trying AnimePahe API');
                const searchUrl = `${ANIMEPAHE_API}?m=search&q=${encodeURIComponent(animeTitle)}`;
                const searchData = await fetchAPI(searchUrl);
                
                if (searchData?.data?.length > 0) {
                    const animeId = searchData.data[0].session;
                    const episodesUrl = `${ANIMEPAHE_API}?m=release&id=${animeId}&sort=episode_asc`;
                    const episodesData = await fetchAPI(episodesUrl);
                    
                    if (episodesData?.data?.length > 0) {
                        return episodesData.data.map(ep => ({
                            id: `animepahe-${animeId}-${ep.episode}`,
                            number: ep.episode,
                            title: ep.title || `Episode ${ep.episode}`
                        }));
                    }
                }
            } catch (error) {
                console.log('AnimePahe API failed:', error);
            }
            
            // Third try: Generate dummy episodes based on total episodes from Jikan
            if (currentAnime && currentAnime.episodes && currentAnime.episodes > 0) {
                console.log('Using dummy episodes from Jikan data');
                const dummyEpisodes = [];
                for (let i = 1; i <= Math.min(currentAnime.episodes, 50); i++) {
                    dummyEpisodes.push({
                        id: `dummy-${i}`,
                        number: i,
                        title: `Episode ${i}`
                    });
                }
                return dummyEpisodes;
            }
            
            return [];
        }

        // Get streaming links from multiple sources
        async function getStreamingLinks(episodeId, episodeNum, animeTitle) {
            // If it's a dummy episode, try to construct a search URL
            if (episodeId.startsWith('dummy-')) {
                // Try to find actual stream using search
                for (const api of CONSUMET_APIS) {
                    try {
                        const searchUrl = `${api}/anime/gogoanime/${encodeURIComponent(animeTitle)}`;
                        const searchData = await fetchAPI(searchUrl);
                        if (searchData?.results?.length > 0) {
                            const animeId = searchData.results[0].id;
                            const watchUrl = `${api}/anime/gogoanime/watch/${animeId}-episode-${episodeNum}`;
                            const watchData = await fetchAPI(watchUrl);
                            if (watchData?.sources?.length > 0) {
                                return watchData.sources;
                            }
                        }
                    } catch (error) {
                        continue;
                    }
                }
                return [];
            }
            
            // Try Consumet API for actual episode
            try {
                const watchUrl = `${currentConsumetApi}/anime/gogoanime/watch/${episodeId}`;
                const data = await fetchAPI(watchUrl);
                if (data?.sources?.length > 0) {
                    return data.sources;
                }
            } catch (error) {
                console.log('Stream fetch error:', error);
            }
            
            return [];
        }

        function getServerName(url) {
            if (url.includes('gogocdn')) return 'GogoCDN';
            if (url.includes('vidstream')) return 'VidStreaming';
            if (url.includes('streamsb')) return 'StreamSB';
            if (url.includes('mp4upload')) return 'Mp4Upload';
            if (url.includes('kwik')) return 'Kwik';
            if (url.includes('pahe')) return 'Pahe';
            return 'Server';
        }

        function loadVideo(url, isM3U8 = false) {
            const video = document.getElementById('anime-video');
            if (!video) return;
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            
            if (isM3U8 && Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay prevented'));
                });
            } else {
                video.src = url;
                video.load();
                video.play().catch(e => console.log('Autoplay prevented'));
            }
        }

        async function loadEpisode(episodeId, episodeNum, animeTitle) {
            const videoSection = document.getElementById('videoSection');
            if (videoSection) {
                videoSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            if (videoPlaceholder) {
                videoPlaceholder.innerHTML = `
                    <div class="video-player">
                        <video id="anime-video" controls playsinline webkit-playsinline>
                            <source src="" type="video/mp4">
                        </video>
                    </div>
                    <div class="video-info">
                        <div class="current-episode">
                            <i class="fas fa-play-circle"></i> Episode ${episodeNum}
                        </div>
                        <div class="server-selector" id="serverSelector">
                            <div class="server-label"><i class="fas fa-server"></i> Loading servers...</div>
                        </div>
                        <div class="fix-guide">
                            <i class="fas fa-question-circle"></i> If video doesn't play, try a different server
                        </div>
                    </div>
                `;
            }
            
            const sources = await getStreamingLinks(episodeId, episodeNum, animeTitle);
            
            const serverSelector = document.getElementById('serverSelector');
            if (sources && sources.length > 0) {
                // Group by server
                const serverMap = new Map();
                sources.forEach(source => {
                    let serverName = getServerName(source.url);
                    if (!serverMap.has(serverName)) {
                        serverMap.set(serverName, []);
                    }
                    serverMap.get(serverName).push(source);
                });
                
                serverSelector.innerHTML = `
                    <div class="server-label"><i class="fas fa-server"></i> Select Server:</div>
                    <div class="server-buttons" id="serverButtons"></div>
                    <div class="quality-wrapper" id="qualityWrapper" style="display: none;">
                        <div class="quality-label">Quality:</div>
                        <div class="quality-buttons" id="qualityButtons"></div>
                    </div>
                `;
                
                const serverButtons = document.getElementById('serverButtons');
                const qualityWrapper = document.getElementById('qualityWrapper');
                const qualityButtons = document.getElementById('qualityButtons');
                
                let isFirst = true;
                for (const [serverName, serverSources] of serverMap) {
                    const btn = document.createElement('button');
                    btn.className = 'server-btn';
                    if (isFirst) btn.classList.add('active');
                    btn.textContent = serverName;
                    btn.onclick = () => {
                        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateQualityOptions(serverSources, qualityWrapper, qualityButtons);
                        const best = serverSources.find(s => s.quality === '1080p') || serverSources[0];
                        if (best) loadVideo(best.url, best.url.includes('.m3u8'));
                    };
                    serverButtons.appendChild(btn);
                    isFirst = false;
                }
                
                const firstSources = Array.from(serverMap.values())[0];
                if (firstSources) {
                    updateQualityOptions(firstSources, qualityWrapper, qualityButtons);
                    const best = firstSources.find(s => s.quality === '1080p') || firstSources[0];
                    if (best) loadVideo(best.url, best.url.includes('.m3u8'));
                }
            } else {
                serverSelector.innerHTML = `
                    <div class="server-label">
                        <i class="fas fa-exclamation-triangle"></i> No streams available
                    </div>
                    <div class="fix-guide" style="margin-top: 10px;">
                        Try refreshing the page or check back later.
                    </div>
                `;
            }
        }
        
        function updateQualityOptions(sources, wrapper, container) {
            if (!wrapper || !container) return;
            wrapper.style.display = 'block';
            container.innerHTML = '';
            sources.forEach((source, idx) => {
                const btn = document.createElement('button');
                btn.className = 'quality-btn';
                if (idx === 0) btn.classList.add('active');
                btn.textContent = source.quality || 'Auto';
                btn.onclick = () => {
                    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadVideo(source.url, source.url.includes('.m3u8'));
                };
                container.appendChild(btn);
            });
        }

        async function loadCharacters(animeId) {
            const container = document.getElementById('charactersGrid');
            if (!container) return;
            try {
                const data = await fetchAPI(`${API_BASE}/anime/${animeId}/characters`);
                if (data?.data?.length > 0) {
                    container.innerHTML = '';
                    data.data.slice(0, 12).forEach(char => {
                        const charCard = document.createElement('div');
                        charCard.className = 'character-card';
                        const img = char.character.images?.jpg?.image_url || 'https://via.placeholder.com/100x100';
                        charCard.innerHTML = `
                            <img class="character-img" src="${img}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;margin-bottom:8px;">
                            <div class="character-name">${char.character.name.length > 20 ? char.character.name.substring(0, 18) + '...' : char.character.name}</div>
                            <div class="character-role" style="font-size:0.7rem;color:var(--text-muted);">${char.role}</div>
                        `;
                        container.appendChild(charCard);
                    });
                }
            } catch (error) {
                console.error('Characters error:', error);
            }
        }

        async function renderAnimePage() {
            const app = document.getElementById('app');
            const animeId = getAnimeId();
            
            if (!animeId) {
                app.innerHTML = `<div class="container"><div class="error-message"><i class="fas fa-exclamation-circle"></i><h2>No Anime Selected</h2><a href="index.html" class="btn btn-primary" style="margin-top:16px;">Go Home</a></div></div>`;
                return;
            }
            
            try {
                const animeData = await fetchAnimeDetails(animeId);
                currentAnime = animeData.data;
                
                if (!currentAnime) throw new Error('Not found');
                
                // Fetch episodes
                currentEpisodes = await fetchEpisodesFromMultipleAPIs(currentAnime.title);
                
                app.innerHTML = `
                    <div class="anime-hero" style="background-image: url('${currentAnime.images?.jpg?.large_image_url || ''}')">
                        <div class="container">
                            <div class="anime-hero-content">
                                <div class="anime-poster">
                                    <img src="${currentAnime.images?.jpg?.large_image_url || currentAnime.images?.jpg?.image_url}" onerror="this.src='https://via.placeholder.com/300x450'">
                                </div>
                                <div class="anime-info-hero">
                                    <h1 class="anime-title">${currentAnime.title}</h1>
                                    <div class="anime-badges">
                                        <span class="badge badge-score"><i class="fas fa-star"></i> ${currentAnime.score || 'N/A'}</span>
                                        ${currentAnime.rank ? `<span class="badge badge-rank"><i class="fas fa-chart-line"></i> Rank #${currentAnime.rank}</span>` : ''}
                                    </div>
                                    <div class="anime-stats">
                                        <div class="stat"><i class="fas fa-calendar"></i> ${currentAnime.year || '?'}</div>
                                        <div class="stat"><i class="fas fa-tv"></i> ${currentAnime.episodes || '?'} eps</div>
                                        <div class="stat"><i class="fas fa-clock"></i> ${currentAnime.duration || '?'}</div>
                                    </div>
                                    <p class="anime-synopsis">${(currentAnime.synopsis || 'No synopsis available.').substring(0, 300)}</p>
                                    <button class="read-more-btn" id="readMoreBtn">Read More</button>
                                    <div class="anime-genres">
                                        ${currentAnime.genres?.map(g => `<span class="genre-tag">${g.name}</span>`).join('') || ''}
                                    </div>
                                    <div class="action-buttons">
                                        <button class="btn btn-primary" id="watchNowBtn"><i class="fas fa-play"></i> Watch Now</button>
                                        <button class="btn btn-outline" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="container">
                        <div class="video-section" id="videoSection">
                            <div id="videoPlaceholder">
                                <div class="video-player" style="background:#000;min-height:200px;display:flex;align-items:center;justify-content:center;">
                                    <p style="color:#666;">Select an episode to start watching</p>
                                </div>
                            </div>
                        </div>

                        <div class="episodes-section">
                            <h2 class="section-title">Episodes</h2>
                            <div class="episodes-grid" id="episodesGrid"></div>
                        </div>

                        <div class="info-grid">
                            <div class="info-card">
                                <h3><i class="fas fa-info-circle"></i> Details</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Type:</span><span class="info-value">${currentAnime.type || 'Unknown'}</span></li>
                                    <li><span class="info-label">Status:</span><span class="info-value">${currentAnime.status || 'Unknown'}</span></li>
                                    <li><span class="info-label">Studios:</span><span class="info-value">${currentAnime.studios?.map(s => s.name).join(', ') || 'Unknown'}</span></li>
                                </ul>
                            </div>
                            <div class="info-card">
                                <h3><i class="fas fa-tags"></i> Themes</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Genres:</span><span class="info-value">${currentAnime.genres?.map(g => g.name).join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Themes:</span><span class="info-value">${currentAnime.themes?.map(t => t.name).join(', ') || 'None'}</span></li>
                                </ul>
                            </div>
                        </div>

                        <div class="characters-section">
                            <h2 class="section-title">Characters</h2>
                            <div class="characters-grid" id="charactersGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;margin:20px 0;"></div>
                        </div>
                    </div>
                `;
                
                // Load episodes into grid
                const episodesGrid = document.getElementById('episodesGrid');
                if (currentEpisodes.length > 0) {
                    episodesGrid.innerHTML = '';
                    currentEpisodes.forEach(ep => {
                        const epCard = document.createElement('div');
                        epCard.className = 'episode-card';
                        epCard.innerHTML = `<div class="episode-number">Ep ${ep.number}</div>`;
                        epCard.onclick = () => {
                            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
                            epCard.classList.add('active');
                            loadEpisode(ep.id, ep.number, currentAnime.title);
                        };
                        episodesGrid.appendChild(epCard);
                    });
                } else {
                    episodesGrid.innerHTML = '<div class="no-data">No episodes available. Try refreshing or check back later.</div>';
                }
                
                await loadCharacters(animeId);
                
                // Event listeners
                document.getElementById('readMoreBtn')?.addEventListener('click', () => {
                    const synopsis = document.querySelector('.anime-synopsis');
                    const btn = document.getElementById('readMoreBtn');
                    if (synopsis) {
                        synopsis.style.webkitLineClamp = synopsis.style.webkitLineClamp === 'unset' ? '3' : 'unset';
                        btn.textContent = synopsis.style.webkitLineClamp === 'unset' ? 'Read Less' : 'Read More';
                    }
                });
                
                document.getElementById('watchNowBtn')?.addEventListener('click', () => {
                    const firstEpisode = document.querySelector('.episode-card');
                    if (firstEpisode) firstEpisode.click();
                });
                
                document.getElementById('shareBtn')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href);
                    alert('Link copied!');
                });
                
            } catch (error) {
                console.error('Error:', error);
                app.innerHTML = `<div class="container"><div class="error-message"><i class="fas fa-frown"></i><h2>Error Loading Anime</h2><p>${error.message}</p><a href="index.html" class="btn btn-primary" style="margin-top:16px;">Go Home</a></div></div>`;
            }
        }
        
        renderAnimePage();
    </script>
</body>
</html>
