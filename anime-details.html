<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Watch anime online - Full anime details, episodes, streaming links">
    <title>Anime Details - AnimeDiscovery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff2a6d;
            --primary-dark: #cc0052;
            --secondary: #05d9e8;
            --dark: #0a0a0f;
            --darker: #050508;
            --card-bg: #151520;
            --card-hover: #1f1f2e;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --text-light: #c0c0d0;
            --border: #2a2a3a;
            --gradient: linear-gradient(135deg, #ff2a6d, #05d9e8);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --header-height: 70px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            background: none;
            -webkit-text-fill-color: var(--primary);
            margin-right: 8px;
        }

        .back-home {
            color: var(--text);
            text-decoration: none;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 1.4rem;
        }

        .back-home:hover {
            background: var(--primary);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hero Section */
        .anime-hero {
            margin-top: var(--header-height);
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: flex-end;
            padding: 60px 0 40px;
            background-size: cover;
            background-position: center 30%;
            position: relative;
        }

        .anime-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.4) 100%);
        }

        .anime-hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .anime-poster {
            flex-shrink: 0;
            width: 250px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .anime-poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .anime-info-hero {
            flex: 1;
        }

        .anime-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .anime-title-japanese {
            font-size: 1.4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .anime-badges {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .badge-score {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .badge-rank {
            background: rgba(255, 42, 109, 0.2);
            color: var(--primary);
        }

        .badge-status {
            background: rgba(5, 217, 232, 0.2);
            color: var(--secondary);
        }

        .anime-stats {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            color: var(--text-light);
        }

        .stat i {
            color: var(--primary);
            width: 20px;
        }

        .anime-synopsis {
            margin-bottom: 20px;
            line-height: 1.8;
            color: var(--text-light);
        }

        .anime-genres {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .genre-tag {
            background: rgba(255, 42, 109, 0.15);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .genre-tag:hover {
            background: var(--primary);
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(255, 42, 109, 0.1);
        }

        /* Video Player Section */
        .video-section {
            background: var(--darker);
            border-radius: var(--radius);
            margin: 40px 0;
            overflow: hidden;
        }

        .video-player {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .video-player video {
            width: 100%;
            height: 100%;
        }

        .video-info {
            padding: 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .current-episode {
            font-size: 1.6rem;
            font-weight: 600;
        }

        .quality-selector {
            display: flex;
            gap: 10px;
        }

        .quality-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .quality-btn.active, .quality-btn:hover {
            background: var(--primary);
        }

        /* Episodes List */
        .episodes-section {
            margin: 40px 0;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 15px;
            position: relative;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 25px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .episodes-grid::-webkit-scrollbar {
            width: 6px;
        }

        .episodes-grid::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 3px;
        }

        .episodes-grid::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .episode-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .episode-card:hover {
            background: rgba(255, 42, 109, 0.1);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .episode-card.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .episode-number {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .episode-title {
            font-size: 1rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-card.active .episode-title {
            color: white;
        }

        /* Additional Info Sections */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
        }

        .info-card h3 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-muted);
            width: 100px;
        }

        .info-value {
            flex: 1;
            color: var(--text-light);
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .character-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .character-card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
        }

        .character-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .character-name {
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .character-role {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .rec-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .rec-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .rec-img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .rec-info {
            padding: 10px;
        }

        .rec-title {
            font-size: 1.2rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Trailer Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 900px;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--primary);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-top: 100px;
        }

        .error-message i {
            font-size: 5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .error-message h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .anime-hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .anime-poster {
                width: 200px;
            }
            .anime-title {
                font-size: 2rem;
            }
            .anime-stats {
                justify-content: center;
            }
            .anime-genres {
                justify-content: center;
            }
            .action-buttons {
                justify-content: center;
            }
            .info-card {
                text-align: center;
            }
            .info-list li {
                flex-direction: column;
                align-items: center;
            }
            .info-label {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-infinity"></i>
            AnimeDiscovery
        </a>
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </header>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Trailer Modal -->
    <div class="modal" id="trailerModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeTrailerModal()">
                <i class="fas fa-times"></i>
            </button>
            <iframe id="trailerIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'https://api.jikan.moe/v4';
        const CONSUMET_API = 'https://api.consumet.org';
        
        let currentAnime = null;
        let currentEpisodes = [];
        let currentVideoElement = null;
        let currentHls = null;

        // Get anime ID from URL
        function getAnimeId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Fetch anime details
        async function fetchAnimeDetails(id) {
            await new Promise(resolve => setTimeout(resolve, 400));
            const response = await fetch(`${API_BASE}/anime/${id}/full`);
            if (!response.ok) throw new Error('Anime not found');
            const data = await response.json();
            return data.data;
        }

        // Fetch episodes from Consumet
        async function fetchEpisodes(gogoanimeId) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/info/${gogoanimeId}`);
                if (!response.ok) return [];
                const data = await response.json();
                return data.episodes || [];
            } catch (error) {
                console.error('Episode fetch error:', error);
                return [];
            }
        }

        // Search for Gogoanime ID
        async function searchGogoanimeId(title) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/${encodeURIComponent(title)}`);
                if (!response.ok) return null;
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].id;
                }
                return null;
            } catch (error) {
                console.error('Gogoanime search error:', error);
                return null;
            }
        }

        // Get streaming links for episode
        async function getStreamingLinks(episodeId) {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));
                const response = await fetch(`${CONSUMET_API}/anime/gogoanime/watch/${episodeId}`);
                if (!response.ok) return [];
                const data = await response.json();
                return data.sources || [];
            } catch (error) {
                console.error('Stream fetch error:', error);
                return [];
            }
        }

        // Load video with HLS support
        function loadVideo(url, isM3U8 = false) {
            const video = document.getElementById('anime-video');
            if (!video) return;
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            
            if (isM3U8 && Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay prevented:', e));
                });
            } else {
                video.src = url;
                video.load();
                video.play().catch(e => console.log('Autoplay prevented:', e));
            }
        }

        // Load episode
        async function loadEpisode(episodeId, episodeNum) {
            const videoSection = document.getElementById('videoSection');
            if (videoSection) {
                videoSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            const episodeTitle = document.getElementById('currentEpisodeTitle');
            if (episodeTitle) {
                episodeTitle.textContent = `Episode ${episodeNum}`;
            }
            
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            if (videoPlaceholder) {
                videoPlaceholder.innerHTML = `
                    <div class="video-player">
                        <video id="anime-video" controls playsinline webkit-playsinline>
                            <source src="" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                    <div class="video-info">
                        <div class="current-episode">Episode ${episodeNum}</div>
                        <div class="quality-selector" id="qualitySelector"></div>
                    </div>
                `;
            }
            
            const sources = await getStreamingLinks(episodeId);
            
            if (sources && sources.length > 0) {
                const qualitySelector = document.getElementById('qualitySelector');
                if (qualitySelector) {
                    qualitySelector.innerHTML = '';
                    sources.forEach((source, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'quality-btn';
                        if (idx === 0) btn.classList.add('active');
                        btn.textContent = source.quality || 'Auto';
                        btn.onclick = () => {
                            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            loadVideo(source.url, source.url.includes('.m3u8'));
                        };
                        qualitySelector.appendChild(btn);
                    });
                }
                
                // Load first source
                const firstSource = sources[0];
                loadVideo(firstSource.url, firstSource.url.includes('.m3u8'));
            } else {
                const videoPlaceholder = document.getElementById('videoPlaceholder');
                if (videoPlaceholder) {
                    videoPlaceholder.innerHTML = `
                        <div class="error-message" style="margin: 0;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>No Stream Available</h3>
                            <p>No video sources found for this episode.</p>
                            <p style="font-size: 1.2rem; margin-top: 10px;">Try a different episode or check back later.</p>
                        </div>
                    `;
                }
            }
        }

        // Render full page
        async function renderAnimePage() {
            const app = document.getElementById('app');
            const animeId = getAnimeId();
            
            if (!animeId) {
                app.innerHTML = `
                    <div class="container">
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle"></i>
                            <h2>No Anime Selected</h2>
                            <p>Please go back and select an anime to watch.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">Go Home</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            try {
                currentAnime = await fetchAnimeDetails(animeId);
                
                if (!currentAnime) {
                    throw new Error('Anime not found');
                }
                
                // Search for Gogoanime ID
                const gogoId = await searchGogoanimeId(currentAnime.title);
                if (gogoId) {
                    currentEpisodes = await fetchEpisodes(gogoId);
                }
                
                // Render the page
                app.innerHTML = `
                    <!-- Hero Section -->
                    <div class="anime-hero" style="background-image: url('${currentAnime.images?.jpg?.large_image_url || ''}')">
                        <div class="container">
                            <div class="anime-hero-content">
                                <div class="anime-poster">
                                    <img src="${currentAnime.images?.jpg?.large_image_url || currentAnime.images?.jpg?.image_url}" alt="${currentAnime.title}" onerror="this.src='https://via.placeholder.com/300x450'">
                                </div>
                                <div class="anime-info-hero">
                                    <h1 class="anime-title">${currentAnime.title}</h1>
                                    ${currentAnime.title_japanese ? `<div class="anime-title-japanese">${currentAnime.title_japanese}</div>` : ''}
                                    <div class="anime-badges">
                                        <span class="badge badge-score"><i class="fas fa-star"></i> ${currentAnime.score || 'N/A'}</span>
                                        ${currentAnime.rank ? `<span class="badge badge-rank"><i class="fas fa-chart-line"></i> Rank #${currentAnime.rank}</span>` : ''}
                                        <span class="badge badge-status"><i class="fas fa-info-circle"></i> ${currentAnime.status || 'Unknown'}</span>
                                    </div>
                                    <div class="anime-stats">
                                        <div class="stat"><i class="fas fa-calendar"></i> ${currentAnime.year || '?'}</div>
                                        <div class="stat"><i class="fas fa-tv"></i> ${currentAnime.episodes || '?'} episodes</div>
                                        <div class="stat"><i class="fas fa-clock"></i> ${currentAnime.duration || '?'}</div>
                                        <div class="stat"><i class="fas fa-chart-simple"></i> Popularity #${currentAnime.popularity || '?'}</div>
                                        <div class="stat"><i class="fas fa-users"></i> ${currentAnime.members?.toLocaleString() || '?'} members</div>
                                    </div>
                                    <div class="anime-genres">
                                        ${currentAnime.genres?.map(g => `<span class="genre-tag" data-genre="${g.mal_id}">${g.name}</span>`).join('') || ''}
                                    </div>
                                    <p class="anime-synopsis">${currentAnime.synopsis || 'No synopsis available.'}</p>
                                    <div class="action-buttons">
                                        <button class="btn btn-primary" id="watchNowBtn">
                                            <i class="fas fa-play"></i> Watch Now
                                        </button>
                                        ${currentAnime.trailer?.embed_url ? `
                                            <button class="btn btn-outline" id="trailerBtn">
                                                <i class="fas fa-film"></i> Watch Trailer
                                            </button>
                                        ` : ''}
                                        <button class="btn btn-outline" id="shareBtn">
                                            <i class="fas fa-share-alt"></i> Share
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="container">
                        <!-- Video Player Section -->
                        <div class="video-section" id="videoSection">
                            <div id="videoPlaceholder">
                                <div class="video-player" style="background: #000; min-height: 300px; display: flex; align-items: center; justify-content: center;">
                                    <p style="color: #666;">Select an episode to start watching</p>
                                </div>
                            </div>
                        </div>

                        <!-- Episodes Section -->
                        <div class="episodes-section" id="episodesSection">
                            <h2 class="section-title">Episodes</h2>
                            <div class="episodes-grid" id="episodesGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>

                        <!-- Additional Info Grid -->
                        <div class="info-grid">
                            <div class="info-card">
                                <h3><i class="fas fa-info-circle"></i> Details</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Type:</span><span class="info-value">${currentAnime.type || 'Unknown'}</span></li>
                                    <li><span class="info-label">Episodes:</span><span class="info-value">${currentAnime.episodes || '?'}</span></li>
                                    <li><span class="info-label">Status:</span><span class="info-value">${currentAnime.status || 'Unknown'}</span></li>
                                    <li><span class="info-label">Aired:</span><span class="info-value">${currentAnime.aired?.string || 'Unknown'}</span></li>
                                    <li><span class="info-label">Premiered:</span><span class="info-value">${currentAnime.season ? `${currentAnime.season} ${currentAnime.year}` : 'Unknown'}</span></li>
                                    <li><span class="info-label">Studios:</span><span class="info-value">${currentAnime.studios?.map(s => s.name).join(', ') || 'Unknown'}</span></li>
                                    <li><span class="info-label">Source:</span><span class="info-value">${currentAnime.source || 'Unknown'}</span></li>
                                    <li><span class="info-label">Rating:</span><span class="info-value">${currentAnime.rating || 'Unknown'}</span></li>
                                </ul>
                            </div>
                            
                            <div class="info-card">
                                <h3><i class="fas fa-tags"></i> Themes & Demographics</h3>
                                <ul class="info-list">
                                    <li><span class="info-label">Themes:</span><span class="info-value">${currentAnime.themes?.map(t => t.name).join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Demographics:</span><span class="info-value">${currentAnime.demographics?.map(d => d.name).join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Opening Themes:</span><span class="info-value">${currentAnime.theme?.openings?.join(', ') || 'None'}</span></li>
                                    <li><span class="info-label">Ending Themes:</span><span class="info-value">${currentAnime.theme?.endings?.join(', ') || 'None'}</span></li>
                                </ul>
                            </div>
                        </div>

                        <!-- Characters Section -->
                        <div class="characters-section" id="charactersSection">
                            <h2 class="section-title">Characters & Voice Actors</h2>
                            <div class="characters-grid" id="charactersGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>

                        <!-- Recommendations Section -->
                        <div class="recommendations-section" id="recommendationsSection">
                            <h2 class="section-title">You Might Also Like</h2>
                            <div class="recommendations-grid" id="recommendationsGrid">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Load episodes
                if (currentEpisodes.length > 0) {
                    const episodesGrid = document.getElementById('episodesGrid');
                    episodesGrid.innerHTML = '';
                    currentEpisodes.forEach((ep, index) => {
                        const epCard = document.createElement('div');
                        epCard.className = 'episode-card';
                        epCard.innerHTML = `
                            <div class="episode-number">Episode ${ep.number}</div>
                            <div class="episode-title">${ep.title || `Ep ${ep.number}`}</div>
                        `;
                        epCard.onclick = () => {
                            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
                            epCard.classList.add('active');
                            loadEpisode(ep.id, ep.number);
                        };
                        episodesGrid.appendChild(epCard);
                    });
                } else {
                    const episodesGrid = document.getElementById('episodesGrid');
                    episodesGrid.innerHTML = `
                        <div class="error-message" style="grid-column: 1/-1;">
                            <i class="fas fa-video-slash"></i>
                            <p>No episodes available for this anime.</p>
                            <p style="font-size: 1.2rem;">Streaming sources may not be available for this title.</p>
                        </div>
                    `;
                }
                
                // Load characters
                await loadCharacters(animeId);
                
                // Load recommendations
                await loadRecommendations(animeId);
                
                // Event listeners
                const watchNowBtn = document.getElementById('watchNowBtn');
                if (watchNowBtn) {
                    watchNowBtn.onclick = () => {
                        const firstEpisode = document.querySelector('.episode-card');
                        if (firstEpisode) {
                            firstEpisode.click();
                        } else {
                            document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth' });
                        }
                    };
                }
                
                const trailerBtn = document.getElementById('trailerBtn');
                if (trailerBtn) {
                    trailerBtn.onclick = () => openTrailerModal(currentAnime.trailer?.embed_url);
                }
                
                const shareBtn = document.getElementById('shareBtn');
                if (shareBtn) {
                    shareBtn.onclick = () => {
                        navigator.clipboard.writeText(window.location.href);
                        alert('Link copied to clipboard!');
                    };
                }
                
                document.querySelectorAll('.genre-tag').forEach(tag => {
                    tag.onclick = () => {
                        window.location.href = `index.html?genre=${tag.dataset.genre}`;
                    };
                });
                
            } catch (error) {
                console.error('Error:', error);
                app.innerHTML = `
                    <div class="container">
                        <div class="error-message">
                            <i class="fas fa-frown"></i>
                            <h2>Anime Not Found</h2>
                            <p>We couldn't find the anime you're looking for.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">Go Home</a>
                        </div>
                    </div>
                `;
            }
        }
        
        // Load characters
        async function loadCharacters(animeId) {
            const container = document.getElementById('charactersGrid');
            if (!container) return;
            
            try {
                await new Promise(resolve => setTimeout(resolve, 400));
                const response = await fetch(`${API_BASE}/anime/${animeId}/characters`);
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = '';
                    data.data.slice(0, 12).forEach(char => {
                        const charCard = document.createElement('div');
                        charCard.className = 'character-card';
                        const charImage = char.character.images?.jpg?.image_url || 'https://via.placeholder.com/100';
                        charCard.innerHTML = `
                            <img class="character-img" src="${charImage}" alt="${char.character.name}" onerror="this.src='https://via.placeholder.com/100'">
                            <div class="character-name">${char.character.name}</div>
                            <div class="character-role">${char.role}</div>
                        `;
                        container.appendChild(charCard);
                    });
                } else {
                    container.innerHTML = '<div class="error-message" style="grid-column: 1/-1;"><p>No character information available.</p></div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="error-message" style="grid-column: 1/-1;"><p>Failed to load characters.</p></div>';
            }
        }
        
        // Load recommendations
        async function loadRecommendations(animeId) {
            const container = document.getElementById('recommendationsGrid');
            if (!container) return;
            
            try {
                await new Promise(resolve => setTimeout(resolve, 400));
                const response = await fetch(`${API_BASE}/anime/${animeId}/recommendations`);
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    container.innerHTML = '';
                    data.data.slice(0, 8).forEach(rec => {
                        const recCard = document.createElement('div');
                        recCard.className = 'rec-card';
                        const anime = rec.entry;
                        const image = anime.images?.jpg?.image_url || 'https://via.placeholder.com/160x240';
                        recCard.innerHTML = `
                            <img class="rec-img" src="${image}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/160x240'">
                            <div class="rec-info">
                                <div class="rec-title">${anime.title}</div>
                            </div>
                        `;
                        recCard.onclick = () => {
                            window.location.href = `anime-details.html?id=${anime.mal_id}`;
                        };
                        container.appendChild(recCard);
                    });
                } else {
                    container.innerHTML = '<div class="error-message" style="grid-column: 1/-1;"><p>No recommendations available.</p></div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="error-message" style="grid-column: 1/-1;"><p>Failed to load recommendations.</p></div>';
            }
        }
        
        // Trailer modal functions
        function openTrailerModal(url) {
            if (!url) return;
            const modal = document.getElementById('trailerModal');
            const iframe = document.getElementById('trailerIframe');
            iframe.src = url;
            modal.classList.add('active');
        }
        
        function closeTrailerModal() {
            const modal = document.getElementById('trailerModal');
            const iframe = document.getElementById('trailerIframe');
            iframe.src = '';
            modal.classList.remove('active');
        }
        
        // Start the page
        renderAnimePage();
    </script>
</body>
</html>
